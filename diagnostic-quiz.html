<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التشخيص المتعدد | Vitalis Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8593868216316247"
     crossorigin="anonymous"></script>  <style>
        .quiz-container {
            max-width: 900px;
            margin: 120px auto 60px;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        .xray-viewer {
            width: 100%;
            height: 450px;
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }
        .xray-viewer img {
            max-width: 100%;
            max-height: 100%;
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 3s linear infinite;
            display: none;
        }
        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 20px;
        }
        .option-btn {
            padding: 15px;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-family: var(--font-ar);
            font-weight: 600;
            transition: 0.3s;
            text-align: center;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--accent);
        }
        .option-btn.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        .option-btn.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .ai-analysis {
            background: var(--accent);
            border-right: 4px solid var(--primary);
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px 0 0 10px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="Vitalis Clinic Logo" class="app-logo">
                <span>Vitalis<span>Clinic</span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="students.html">مركز الطلاب</a></li>
                <li><a href="#" class="btn-primary">النقاط: <span id="score">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="quiz-container">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="quizContent">
                <!-- Content will be injected by JS -->
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                title: "تحليل حالة صدرية - الحالة الأولى",
                image: "sample_xray.png",
                options: ["التهاب رئوي فصي", "تضخم عضلة القلب", "استرواح الصدر", "تليف رئوي"],
                correctIndex: 1,
                aiAnalysis: "يظهر في الصورة ظل قلبي عريض (Cardiomegaly) حيث تتجاوز النسبة القلبية الصدرية 0.5. هذا مؤشر قوي على فشل القلب أو اعتلال العضلة القلبية."
            },
            {
                id: 2,
                title: "تحليل حالة صدرية - الحالة الثانية",
                image: "xray_pneumonia.png",
                options: ["سرطان الرئة", "التهاب رئوي (Pneumonia)", "انصباب جنبي", "وذمة رئوية"],
                correctIndex: 1,
                aiAnalysis: "نلاحظ وجود كثافة (Opacity) غير متجانسة في الفص السفلي الأيمن مع وجود علامة 'Air Bronchogram'. هذه المعالم كلاسيكية للالتهاب الرئوي الجرثومي."
            },
            {
                id: 3,
                title: "تحليل حالة صدرية - الحالة الثالثة",
                image: "xray_pneumothorax.png",
                options: ["توسع القصبات", "انسداد رئوي", "استرواح الصدر (Pneumothorax)", "فتق حجابي"],
                correctIndex: 2,
                aiAnalysis: "يظهر غياب تام للمعالم الرئوية (Lung Markings) في الجانب الأيسر مع انكماش الرئة نحو الجذر (Hilum). هذه حالة إسعافية تتطلب تدخلاً فورياً."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            const content = document.getElementById('quizContent');
            const progress = (currentQuestionIndex / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;

            content.innerHTML = `
                <div class="quiz-header">
                    <span class="badge">اختبار تشخيصي #${q.id}</span>
                    <h2>${q.title}</h2>
                    <p>افحص الصورة بدقة واختر التشخيص الصحيح:</p>
                </div>
                <div class="xray-viewer">
                    <div class="scan-line" id="scanLine"></div>
                    <img src="${q.image}" alt="Medical Case">
                </div>
                <div class="options-grid" id="optionsGrid">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(this, ${i === q.correctIndex}, '${opt}')">${opt}</button>
                    `).join('')}
                </div>
                <div id="resultBox" class="result-box">
                    <h3 id="resultTitle"></h3>
                    <p id="resultDesc"></p>
                    <div class="ai-analysis">
                        <strong><i class="fas fa-robot"></i> تحليل Vitalis AI:</strong>
                        <p>${q.aiAnalysis}</p>
                    </div>
                    <button onclick="nextQuestion()" class="btn-primary" style="margin-top: 20px; width: 100%;" id="nextBtn">
                        ${currentQuestionIndex === questions.length - 1 ? 'إنهاء الاختبار وعرض النتيجة' : 'الحالة التالية'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(btn, isCorrect, name) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            const scanLine = document.getElementById('scanLine');
            scanLine.style.display = 'block';

            setTimeout(() => {
                scanLine.style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';
                const title = document.getElementById('resultTitle');

                if (isCorrect) {
                    btn.classList.add('correct');
                    title.innerText = "إجابة صحيحة! 🎯";
                    title.style.color = "#166534";
                    score += 100;
                    document.getElementById('score').innerText = score;
                    
                    // Update global state
                    if (window.addVitalisPoints) {
                        window.addVitalisPoints(100, `تشخيص صحيح للحالة: ${name}`);
                    }
                } else {
                    btn.classList.add('wrong');
                    title.innerText = "إجابة خاطئة";
                    title.style.color = "#991b1b";
                    buttons[questions[currentQuestionIndex].correctIndex].classList.add('correct');
                }
            }, 1000);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            const content = document.getElementById('quizContent');
            document.getElementById('progressFill').style.width = `100%`;
            content.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-trophy" style="font-size: 5rem; color: #fbbf24; margin-bottom: 20px;"></i>
                    <h2>اكتمل الاختبار!</h2>
                    <p style="font-size: 1.5rem;">لقد حصلت على <strong style="color: var(--primary);">${score}</strong> نقطة من أصل ${questions.length * 100}</p>
                    <p>أنت الآن جاهز لاستخدام Vitalis Clinic في ممارستك السريرية.</p>
                    <a href="students.html" class="btn-primary" style="margin-top: 20px; display: inline-block;">العودة لمركز الطلاب</a>
                </div>
            `;
        }

        loadQuestion();
    </script>
    <script src="script.js"></script>
</body>
</html>
