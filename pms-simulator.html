<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المرضى | Vitalis PMS Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .pms-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-top: 100px;
            height: calc(100vh - 120px);
        }
        .patient-list {
            background: white;
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
        }
        .patient-card {
            padding: 15px;
            border-radius: 12px;
            background: #f8fafc;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            border-right: 4px solid transparent;
        }
        .patient-card:hover, .patient-card.active {
            background: var(--accent);
            border-right-color: var(--primary);
        }
        .vitals-monitor {
            background: #000;
            color: #00ff00;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Courier New', Courier, monospace;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .vital-box span { font-size: 2rem; display: block; }
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 700;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .order-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            height: 100%;
        }
    </style>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="Vitalis Clinic Logo" class="app-logo">
                <span>Vitalis<span>Clinic</span> PMS</span>
            </div>
            <ul class="nav-links">
                <li><a href="students.html">العودة للأكاديمية</a></li>
                <li><a href="#" class="btn-primary" onclick="admitPatient()">إدخال مريض جديد</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="pms-layout">
            <aside class="patient-list" id="patientList">
                <!-- Patients will be listed here -->
            </aside>

            <main class="order-panel" id="mainPanel">
                <div id="noPatient">
                    <div style="text-align: center; padding-top: 100px;">
                        <i class="fas fa-hospital-user" style="font-size: 5rem; color: #cbd5e1;"></i>
                        <h2>الرجاء اختيار مريض للمتابعة</h2>
                    </div>
                </div>

                <div id="activeContent" style="display: none;">
                    <div class="vitals-monitor">
                        <div class="vital-box">HR <span>72</span> bpm</div>
                        <div class="vital-box">BP <span>120/80</span> mmHg</div>
                        <div class="vital-box">SpO2 <span>98</span> %</div>
                    </div>

                    <div class="tab-nav">
                        <div class="tab-btn active">التقييم السريري</div>
                        <div class="tab-btn">الطلبات المخبرية</div>
                        <div class="tab-btn">العلاجات والجرعات</div>
                    </div>

                    <div id="tabContent">
                        <h3 id="pName">اسم المريض</h3>
                        <p id="pHistory">التاريخ المرضي سيظهر هنا...</p>
                        
                        <div style="margin-top: 30px;">
                            <h4>ملاحظات الطبيب:</h4>
                            <textarea style="width: 100%; height: 100px; border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid #e2e8f0;"></textarea>
                            <button class="btn-primary" style="margin-top: 10px;">حفظ الملاحظات</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const patients = [
            { id: 1, name: "سالم العتيبي", age: 45, diagnosis: "اشتباه بجلطة حادة", history: "يعاني من سكري النوع الثاني وارتفاع ضغط الدم." },
            { id: 2, name: "ليلى أحمد", age: 29, diagnosis: "التهاب لوزتين حاد", history: "لا يوجد تاريخ جراحي سابق." },
            { id: 3, name: "محمد جابر", age: 67, diagnosis: "تليف كبدي", history: "متابع في عيادة الجهاز الهضمي منذ سنتين." }
        ];

        function init() {
            const list = document.getElementById('patientList');
            list.innerHTML = patients.map(p => `
                <div class="patient-card" onclick="selectPatient(${p.id})">
                    <strong>${p.name}</strong><br>
                    <small>${p.age} سنة - ${p.diagnosis}</small>
                </div>
            `).join('');
        }

        function selectPatient(id) {
            const p = patients.find(x => x.id === id);
            document.getElementById('noPatient').style.display = 'none';
            document.getElementById('activeContent').style.display = 'block';
            document.getElementById('pName').innerText = p.name;
            document.getElementById('pHistory').innerText = p.history;
            
            // Randomize vitals to feel alive
            const vitals = document.querySelectorAll('.vital-box span');
            vitals[0].innerText = Math.floor(Math.random() * (90 - 60) + 60);
            vitals[1].innerText = `${Math.floor(Math.random() * (140 - 110) + 110)}/${Math.floor(Math.random() * (90 - 70) + 70)}`;
            vitals[2].innerText = Math.floor(Math.random() * (100 - 95) + 95);
        }

        function admitPatient() {
            alert("هذه الميزة متاحة في النسخة الكاملة من برنامج Vitalis Clinic. يمكنك تحميله من الصفحة الرئيسية.");
        }

        init();
    </script>
    <script src="script.js"></script>
</body>
</html>
